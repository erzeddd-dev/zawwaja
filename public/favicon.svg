<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Pristine Rose Gold Metallic Gradients matching the user's high-end logo -->
    <linearGradient id="roseGoldBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E6BAB0" />
      <stop offset="25%" stop-color="#D4A198" />
      <stop offset="55%" stop-color="#C28277" />
      <stop offset="85%" stop-color="#A66155" />
      <stop offset="100%" stop-color="#7D3B30" />
    </linearGradient>

    <linearGradient id="roseGoldHighlight" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FCECE9" />
      <stop offset="50%" stop-color="#EBC4BD" />
      <stop offset="100%" stop-color="#995246" />
    </linearGradient>

    <!-- Warm elegant background gradient to give a 3D studio background feel -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#FAF5F2" />
    </radialGradient>

    <!-- Exquisite realistic drop shadows -->
    <filter id="royalShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="3" dy="8" stdDeviation="10" flood-color="#5C2D25" flood-opacity="0.18" />
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#5C2D25" flood-opacity="0.1" />
    </filter>

    <filter id="innerBevel" x="-20%" y="-20%" width="140%" height="140%">
      <feOffset dx="1" dy="2"/>
      <feGaussianBlur stdDeviation="1.5" result="offset-blur"/>
      <feComposite operator="out" in="SourceGraphic" in2="offset-blur" result="inverse"/>
      <feFlood flood-color="black" flood-opacity="0.4" result="color"/>
      <feComposite operator="in" in="color" in2="inverse" result="shadow"/>
      <feComposite operator="over" in="shadow" in2="SourceGraphic"/>
    </filter>
  </defs>

  <!-- Luxurious soft-ivory rounded background container -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" rx="112" />

  <!-- Outer frame border with extremely subtle rose gold hairline -->
  <rect x="12" y="12" width="488" height="488" fill="none" stroke="url(#roseGoldHighlight)" stroke-width="1.5" stroke-opacity="0.25" rx="100" />

  <!-- Main Logo Element Group -->
  <g filter="url(#royalShadow)" transform="translate(14, 12)">
    
    <!-- 1. UPPER SWEEP of Arabic 'Z' (Zain) -->
    <!-- Solid metallic base -->
    <path d="M 175,108 C 220,108 278,92 315,86 C 330,83 336,92 332,106 C 326,122 310,132 288,142 C 258,156 215,166 165,168 C 152,168 142,160 142,148 C 142,130 156,108 175,108 Z" 
          fill="url(#roseGoldBody)" />
    
    <!-- 3D Bevel Highlight overlay -->
    <path d="M 175,108 C 210,108 260,96 300,90 C 315,88 322,92 320,100 C 310,115 295,125 275,133 C 240,145 200,154 165,156 C 158,156 150,150 150,142 C 150,128 162,108 175,108 Z" 
          fill="url(#roseGoldHighlight)" opacity="0.45" />

    <!-- Detailed Arabesque leafy filigree scroll engraving on upper tip -->
    <g opacity="0.85">
      <!-- Leaf flourishes inside the top curve tail -->
      <path d="M 282,98 C 288,96 295,95 303,94 C 300,98 296,102 290,104 C 295,105 302,104 308,102 C 304,106 298,110 292,112 C 298,114 305,113 311,110 C 305,115 297,119 288,120 C 278,121 274,115 278,107 C 280,102 281,100 282,98 Z" 
            fill="#FAF5F2" />
      <path d="M 276,108 C 282,109 288,109 292,107 C 288,111 282,113 275,114 Z" 
            fill="#D4A198" opacity="0.6" />
    </g>


    <!-- 2. MAIN SWEEPING DIAGONAL SPINE -->
    <!-- Highly dynamic brush stroke curving gracefully -->
    <path d="M 322,102 C 250,195 204,295 116,346 C 98,356 86,350 86,338 C 86,330 98,310 120,290 C 168,242 228,164 322,102 Z" 
          fill="url(#roseGoldBody)" />
    
    <!-- Spine 3D Highlight curve -->
    <path d="M 314,106 C 248,194 204,286 124,334 C 114,340 108,338 108,332 C 114,320 128,300 148,280 C 188,238 240,166 314,106 Z" 
          fill="url(#roseGoldHighlight)" opacity="0.4" />


    <!-- 3. INTENSE BASE EMBELLISHED LOOP -->
    <!-- Outer metallic loop ring -->
    <path d="M 175,304 C 235,284 365,248 410,278 C 442,298 426,348 376,374 C 314,406 200,400 160,338 C 150,323 156,308 175,304 Z" 
          fill="url(#roseGoldBody)" />

    <!-- Inner cutout core filled with light studio color, revealing the filigree loop interior -->
    <path d="M 190,318 C 240,298 350,268 390,294 C 410,306 405,338 370,358 C 320,384 215,378 185,334 C 180,326 182,320 190,318 Z" 
          fill="url(#bgGrad)" />

    <!-- Gorgeous Arabesque engraving & diagonal trellis/latticework inside the bottom right sweep -->
    <g transform="translate(18, 2)">
      <!-- Detailed trellis framework structure -->
      <path d="M 334,302 C 344,305 354,310 364,318 C 362,324 358,330 354,336 C 344,328 334,318 334,302 Z" fill="#FAF5F2" opacity="0.9"/>
      <!-- Trellis crisscross overlay -->
      <path d="M 342,310 L 358,326 M 348,306 L 364,322 M 354,318 L 342,330 L 334,318 M 346,326 L 338,334" stroke="url(#roseGoldBody)" stroke-width="1.2" opacity="0.4" />
      
      <!-- Leaf scroll details running around the outer loop curve -->
      <path d="M 324,296 C 338,294 352,296 364,302 C 358,304 352,305 344,304 C 348,308 353,312 355,318 C 348,314 340,310 334,308 C 330,312 328,318 322,322 C 324,315 328,308 324,296 Z" 
            fill="url(#roseGoldBody)" />
      <!-- Tiny golden leaf highlights inside the mesh -->
      <circle cx="347" cy="315" r="2.5" fill="url(#roseGoldHighlight)" />
      <circle cx="355" cy="323" r="2.5" fill="url(#roseGoldHighlight)" />
    </g>

    <!-- Gorgeous Calligraphic Rose Gold patterns running inside the bottom left loop tip -->
    <g>
      <path d="M 166,346 C 188,362 218,356 238,341 C 218,336 188,342 166,346 Z" 
            fill="url(#roseGoldHighlight)" opacity="0.8" />
      <!-- Scroll flourish line on the base tail -->
      <path d="M 172,342 C 180,348 190,350 200,348 C 192,346 182,344 172,342 Z" 
            fill="#FAF5F2" />
      <!-- Subtle internal latticework grid at the very base -->
      <path d="M 154,332 C 158,338 164,344 170,350" stroke="url(#roseGoldBody)" stroke-width="1.5" opacity="0.3"/>
      <path d="M 162,328 C 166,334 172,340 178,346" stroke="url(#roseGoldBody)" stroke-width="1.5" opacity="0.3"/>
    </g>


    <!-- 4. FLOATING ARABIC DIAMOND NUQTA (The Signature Mark of Zain) -->
    <!-- Beautifully bevelled 3D diamond symbol -->
    <!-- Base dark diamond shape -->
    <path d="M 282,212 L 307,237 L 282,262 L 257,237 Z" 
          fill="url(#roseGoldBody)" />
    
    <!-- Top-left highlight piece of the diamond giving it a true 3D embossed look -->
    <path d="M 282,212 L 307,237 L 282,237 L 257,237 Z" 
          fill="url(#roseGoldHighlight)" opacity="0.6" />
    
    <!-- Center delicate micro-engraving dot in the diamond -->
    <circle cx="282" cy="237" r="3.5" fill="#FAF5F2" opacity="0.85" />
    
  </g>
</svg>
